# Example inventory for the simpler-objects Ansible playbook.
#
# Copy this to inventory/hosts.yml and edit. Three groups drive the three
# roles in site.yml:
#
#   object_servers — hosts with an attached disk that hold object data
#   locators       — host(s) running the cluster coordinator
#   replicators    — host running the async-replication timer (often == locator)
#
# A host may belong to multiple groups (e.g. the locator and replicator often
# share a host). site.yml runs one play per group, each including
# simpler_objects_common, so common runs once per group the host is in. That is
# idempotent — the venv install and asserts are no-ops on the second pass.

all:
  vars:
    # Connect as the service user — the playbook needs no root or sudo.
    ansible_user: simpler-objects

    # The one knob you change to upgrade. The playbook pins the package to
    # this git tag; bump it and re-run the playbook to upgrade.
    simpler_objects_version: v0.4.4

  children:

    object_servers:
      hosts:
        pi-storage-1.lan:
          # Path to the bucket parent directory on the attached disk.
          # The directory must already be owned by the service user (root prereq).
          object_directory: /mnt/extusb-a/simpler-objects/data
          # Optional knobs (defaults shown):
          # object_server_read_only: false
          # object_server_port: 29171
          # object_server_workers: 1

        pi-storage-2.lan:
          object_directory: /mnt/usb1/simpler-objects/data

    locators:
      hosts:
        pi-coord.lan:
          locator_object_servers:
            - http://pi-storage-1.lan:29171/
            - http://pi-storage-2.lan:29171/
          # Optional:
          # locator_port: 29164
          # locator_workers: 1

    replicators:
      hosts:
        pi-coord.lan:                # same host as the locator is fine
          replicate_locator_url: http://localhost:29164/
          replicate_buckets:
            - photos
            - backups
          replicate_replicas: 2
          # Optional per-bucket overrides — keys are bucket names (any case);
          # the role uppercases them for the REPLICAS_<BUCKET>= env var.
          replicate_replicas_overrides:
            backups: 3

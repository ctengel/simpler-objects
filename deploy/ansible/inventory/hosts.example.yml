# Example inventory for the simpler-objects Ansible playbook.
#
# Copy this to inventory/hosts.yml and edit. Three groups drive the three
# roles in site.yml:
#
#   object_servers — hosts with an attached disk that hold object data
#   locators       — host(s) running the cluster coordinator
#   replicators    — host running the async-replication timer (often == locator)
#
# A host may belong to multiple groups (e.g. the locator and replicator often
# share a host). site.yml runs one play per group, each including
# simpler_objects_common, so common runs once per group the host is in. That is
# idempotent — the venv install and asserts are no-ops on the second pass.

all:
  vars:
    # Connect as the service user — the playbook needs no root or sudo.
    ansible_user: simpler-objects

    # The one knob you change to upgrade. The playbook pins the package to
    # this git tag; bump it and re-run the playbook to upgrade.
    simpler_objects_version: v0.5.0

    # --- Security (all optional; omit everything for plain HTTP, no auth) ---
    # Shared HMAC secret for signed object-server URLs; same value on the
    # whole cluster. Generate with `openssl rand -hex 32` and KEEP IT IN
    # ANSIBLE VAULT (ansible-vault encrypt_string), not plaintext:
    # simpler_objects_cluster_secret: !vault |
    #   $ANSIBLE_VAULT;1.1;AES256
    #   ...

    # Per-host TLS material (control-machine paths); distributed to
    # ~/.config/simpler-objects/tls/ by the simpler_objects_tls role.
    # Certificate generation is manual — see deploy/systemd/README.md.
    # Set cert/key per host (below) and the CA here:
    # tls_ca_src: files/tls/ca.pem

  children:

    object_servers:
      hosts:
        pi-storage-1.lan:
          # Path to the bucket parent directory on the attached disk.
          # The directory must already be owned by the service user (root prereq).
          object_directory: /mnt/extusb-a/simpler-objects/data
          # Optional knobs (defaults shown):
          # object_server_read_only: false
          # object_server_port: 29171
          # object_server_workers: 1
          # Per-host TLS cert/key (control-machine paths; enables HTTPS):
          # tls_certfile_src: files/tls/pi-storage-1.lan.crt
          # tls_keyfile_src: files/tls/pi-storage-1.lan.key

        pi-storage-2.lan:
          object_directory: /mnt/usb1/simpler-objects/data

    locators:
      hosts:
        pi-coord.lan:
          locator_object_servers:
            - http://pi-storage-1.lan:29171/
            - http://pi-storage-2.lan:29171/
          # Optional:
          # locator_port: 29164
          # locator_workers: 1
          # locator_signed_url_ttl: 900
          # Client API keys + per-bucket permissions (renders auth.toml and
          # sets AUTH_CONFIG; requires simpler_objects_cluster_secret; keep
          # the keys in Ansible Vault). Operations: read, write, list;
          # bucket "*" is a wildcard.
          # locator_auth_clients:
          #   oi:
          #     key: "{{ vault_oi_key }}"
          #     buckets:
          #       photos: [read, write, list]
          #   pv:
          #     key: "{{ vault_pv_key }}"
          #     buckets:
          #       "*": [read]
          #   replicator:
          #     key: "{{ vault_replicator_key }}"
          #     buckets:
          #       "*": [list]
          # Per-host TLS cert/key (enables HTTPS):
          # tls_certfile_src: files/tls/pi-coord.lan.crt
          # tls_keyfile_src: files/tls/pi-coord.lan.key

    replicators:
      hosts:
        pi-coord.lan:                # same host as the locator is fine
          replicate_locator_url: http://localhost:29164/
          replicate_buckets:
            - photos
            - backups
          replicate_replicas: 2
          # Optional per-bucket overrides — keys are bucket names (any case);
          # the role uppercases them for the REPLICAS_<BUCKET>= env var.
          replicate_replicas_overrides:
            backups: 3
          # API key for the locator's bucket listing (the `replicator`
          # client above; keep in Vault). The cluster secret from all.vars
          # covers its direct object-server calls.
          # replicate_api_key: "{{ vault_replicator_key }}"

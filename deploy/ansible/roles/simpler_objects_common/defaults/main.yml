---
# Package source. Bump this to upgrade; pip detects the changed ref and
# reinstalls. Idempotent at the same tag.
simpler_objects_version: v0.4.0
simpler_objects_git_url: https://github.com/ctengel/simpler-objects

# Install layout. The systemd units in ../../../systemd/ hardcode this venv
# path; override with a drop-in (`systemctl edit <unit>`) if you change it.
simpler_objects_install_root: /opt/simpler-objects
simpler_objects_venv: "{{ simpler_objects_install_root }}/venv"

# Service user/group (also referenced by unit files).
simpler_objects_user: simpler-objects
simpler_objects_group: simpler-objects

# Force `pip install` to reinstall even when the requirement is already
# satisfied (handy for recovering a corrupted venv). Pass as
# `-e simpler_objects_force_reinstall=true` on the CLI.
simpler_objects_force_reinstall: false

---
- name: Require locator_object_servers
  ansible.builtin.assert:
    that:
      - locator_object_servers is defined
      - locator_object_servers | length > 0
    fail_msg: >
      `locator_object_servers` must be set on the locator host — list of
      object-server URLs with trailing slashes.
    quiet: true

- name: Validate object-server URLs end with trailing slash
  ansible.builtin.assert:
    that: item.endswith('/')
    fail_msg: >
      Object-server URL `{{ item }}` must end with a trailing slash. The
      locator concatenates paths directly onto it.
    quiet: true
  loop: "{{ locator_object_servers }}"

- name: Render locator env file
  ansible.builtin.template:
    src: locator.env.j2
    dest: "{{ simpler_objects_config_dir }}/locator.env"
    mode: "0600"
  notify: Restart simpler-objects service

- name: Install locator unit
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../systemd/simpler-objects-locator.service"
    dest: "{{ simpler_objects_systemd_user_dir }}/simpler-objects-locator.service"
    mode: "0644"
  notify:
    - Reload systemd user daemon
    - Restart simpler-objects service

- name: Enable and start simpler-objects-locator
  ansible.builtin.systemd:
    name: simpler-objects-locator.service
    enabled: true
    state: started
    scope: user

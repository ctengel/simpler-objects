---
- name: Fail early if object_directory not declared
  ansible.builtin.assert:
    that: object_directory is defined
    fail_msg: "Set `object_directory` for this host in inventory."

- name: Verify object_directory is writable
  ansible.builtin.command:
    cmd: "test -w {{ object_directory | quote }}"
  changed_when: false
  register: _so_dir_check
  failed_when: _so_dir_check.rc != 0

- name: Install object-server unit
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../systemd/simpler-objects-object-server.service"
    dest: "{{ simpler_objects_systemd_user_dir }}/simpler-objects-object-server.service"
    mode: "0644"
  notify:
    - Reload systemd user daemon
    - Restart simpler-objects service

- name: Render env file
  ansible.builtin.template:
    src: object-server.env.j2
    dest: "{{ simpler_objects_config_dir }}/object-server.env"
    mode: "0600"
  notify: Restart simpler-objects service

- name: Ensure drop-in directory exists
  ansible.builtin.file:
    path: "{{ simpler_objects_systemd_user_dir }}/simpler-objects-object-server.service.d"
    state: directory
    mode: "0755"

- name: Set RequiresMountsFor drop-in
  ansible.builtin.copy:
    content: |
      [Unit]
      RequiresMountsFor={{ object_directory }}
    dest: "{{ simpler_objects_systemd_user_dir }}/simpler-objects-object-server.service.d/mount.conf"
    mode: "0644"
  notify:
    - Reload systemd user daemon
    - Restart simpler-objects service

- name: Enable and start object-server
  ansible.builtin.systemd:
    name: simpler-objects-object-server.service
    enabled: true
    state: started
    scope: user

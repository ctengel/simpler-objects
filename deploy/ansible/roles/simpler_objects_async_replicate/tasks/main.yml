---
- name: Require replicate_buckets
  ansible.builtin.assert:
    that:
      - replicate_buckets is defined
      - replicate_buckets | length > 0
    fail_msg: >
      `replicate_buckets` must be set on the replicator host — list of bucket
      names to replicate.
    quiet: true

- name: Render async-replicate env file
  ansible.builtin.template:
    src: async-replicate.env.j2
    dest: "{{ simpler_objects_config_dir }}/async-replicate.env"
    mode: "0600"
  # No restart notify: the service is Type=oneshot driven by the timer; the next
  # firing reads the updated env file.

- name: Install async-replicate service and timer units
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../systemd/{{ item }}"
    dest: "{{ simpler_objects_systemd_user_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - simpler-objects-async-replicate.service
    - simpler-objects-async-replicate.timer
  notify: Reload systemd user daemon

- name: Enable and start async-replicate timer
  ansible.builtin.systemd:
    name: simpler-objects-async-replicate.timer
    enabled: true
    state: started
    scope: user
  # The service is Type=oneshot; we don't restart it here. The timer's next
  # firing picks up the new venv automatically.

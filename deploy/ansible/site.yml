---
# Top-level play for the simpler-objects stack.
#
# One play per role. `simpler_objects_common` runs on every host that serves
# any role (storage, locator, replicator); the per-service plays then apply
# the service-specific role on top.
#
# Full deploy:
#     ansible-playbook -i inventory/hosts.yml site.yml
#
# Upgrade only (re-runs pip install and restart handlers):
#     ansible-playbook -i inventory/hosts.yml site.yml --tags update

- name: Install simpler-objects venv on every managed host
  hosts: object_servers:locators:replicators
  become: true
  roles:
    - simpler_objects_common

- name: Configure object server instances
  hosts: object_servers
  become: true
  roles:
    - simpler_objects_object_server

- name: Configure locator
  hosts: locators
  become: true
  roles:
    - simpler_objects_locator

- name: Configure async-replication timer
  hosts: replicators
  become: true
  roles:
    - simpler_objects_async_replicate

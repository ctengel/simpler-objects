---
# Top-level play for the simpler-objects stack.
#
# One play per service role. Each play includes `simpler_objects_common` (venv
# install, config/systemd dirs) followed by the service-specific role.
#
# Full deploy:
#     ansible-playbook -i inventory/hosts.yml site.yml
#
# Upgrade only (re-runs pip install and restart handlers):
#     ansible-playbook -i inventory/hosts.yml site.yml --tags update

- name: Install and configure object server instances
  hosts: object_servers
  roles:
    - simpler_objects_common
    - simpler_objects_object_server

- name: Install and configure locator
  hosts: locators
  roles:
    - simpler_objects_common
    - simpler_objects_locator

- name: Install and configure async-replication timer
  hosts: replicators
  roles:
    - simpler_objects_common
    - simpler_objects_async_replicate

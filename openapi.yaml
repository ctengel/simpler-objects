openapi: 3.1.0
info:
  title: Simpler Objects API
  version: 0.4.3
  description: >
    Example hash values throughout this spec represent SHA-256("hello"):
    hex `2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824`,
    base64 `LPJNul+wow4m6DsqxbninhsWHlwfp0JecwQzYpOLmCQ=`.

tags:
  - name: Health
    description: Server health and capacity status
  - name: Objects
    description: Get, put, and retrieve objects
  - name: Buckets
    description: List and check buckets

paths:
  /health:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Return basic info on cluster health
      operationId: healthcheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                read: true
                write: true
                quota-available-bytes: 107374182400
                quota-used-bytes: 322122547200
                percent: 25
        '500':
          description: Internal server error.
        '503':
          description: >
            Server unavailable (read and write are both false). Reserved for
            future use; currently not returned. Clients should inspect the
            `read` and `write` fields in the 200 response body to determine
            actual availability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                read: false
                write: false
                quota-available-bytes: 0
                quota-used-bytes: 429496729600
                percent: 0
  /{bucket}/{key}:
    get:
      tags:
        - Objects
      summary: Get Object
      description: Retrieve an existing object
      operationId: getObject
      parameters:
      - name: bucket
        in: path
        required: true
        schema:
          type: string
          title: Bucket
        example: my-bucket
      - name: key
        in: path
        required: true
        schema:
          type: string
          title: Key
        example: document.pdf
      - name: Range
        in: header
        required: false
        schema:
          type: string
        description: 'Byte range to retrieve (RFC 7233), e.g. bytes=0-1023'
        example: 'bytes=0-1023'
      - name: If-None-Match
        in: header
        required: false
        schema:
          type: string
        description: 'Return 304 if ETag matches (conditional GET, RFC 9110)'
        example: '"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"'
      responses:
        '200':
          description: Object data (Content-Type reflects the stored object)
          headers:
            Content-Type:
              schema:
                type: string
              description: MIME type of the object
              example: application/pdf
            Content-Length:
              schema:
                type: integer
              description: Size of the object in bytes
              example: 1048576
            Repr-Digest:
              required: false
              schema:
                type: string
              description: 'SHA-256 digest in sf-binary format, e.g. sha-256=:base64:'
              example: 'sha-256=:LPJNul+wow4m6DsqxbninhsWHlwfp0JecwQzYpOLmCQ=:'
            ETag:
              required: false
              schema:
                type: string
              description: 'SHA-256 hex digest as entity tag, e.g. "abc123..." (present when checksum is known)'
              example: '"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"'
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '206':
          description: Partial content
          headers:
            Content-Type:
              schema:
                type: string
              description: MIME type of the object
              example: application/pdf
            Content-Length:
              schema:
                type: integer
              description: Size of the partial content in bytes
              example: 1024
            Content-Range:
              schema:
                type: string
              description: 'Byte range returned (RFC 7233), e.g. bytes 0-1023/1048576'
              example: 'bytes 0-1023/1048576'
            Repr-Digest:
              required: false
              schema:
                type: string
              description: 'SHA-256 digest of the full object'
              example: 'sha-256=:LPJNul+wow4m6DsqxbninhsWHlwfp0JecwQzYpOLmCQ=:'
            ETag:
              required: false
              schema:
                type: string
              description: 'SHA-256 hex digest as entity tag (present when checksum is known)'
              example: '"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"'
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '304':
          description: Not Modified (ETag matched If-None-Match; no body returned)
          headers:
            ETag:
              required: false
              schema:
                type: string
        '307':
          description: Temporary redirect to the server hosting this object (locator-api only)
        '404':
          description: Object not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Object Not Found
                status: 404
                detail: "Object 'document.pdf' not found in bucket 'my-bucket'"
        '416':
          description: Range not satisfiable
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal server error (object-server only).
        '503':
          description: >
            Object temporarily unavailable. From an object server, a PUT of
            this key is in progress. From the locator, no replica could be
            reached cleanly — at least one holds the object but is mid-upload.
            Retry after the delay in the `Retry-After` header.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Suggested retry delay in seconds
              example: 64
    head:
      tags:
        - Objects
      summary: Get Object Metadata
      description: Retrieve metadata for an existing object without downloading it
      operationId: headObject
      parameters:
      - name: bucket
        in: path
        required: true
        schema:
          type: string
          title: Bucket
        example: my-bucket
      - name: key
        in: path
        required: true
        schema:
          type: string
          title: Key
        example: document.pdf
      responses:
        '200':
          description: Object exists
          headers:
            Content-Type:
              schema:
                type: string
              description: MIME type of the object
              example: application/pdf
            Content-Length:
              schema:
                type: integer
              description: Size of the object in bytes
              example: 1048576
            Repr-Digest:
              required: false
              schema:
                type: string
              description: 'SHA-256 digest in sf-binary format, e.g. sha-256=:base64:'
              example: 'sha-256=:LPJNul+wow4m6DsqxbninhsWHlwfp0JecwQzYpOLmCQ=:'
            ETag:
              required: false
              schema:
                type: string
              description: 'SHA-256 hex digest as entity tag (present when checksum is known)'
              example: '"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"'
        '307':
          description: Temporary redirect to the server hosting this object (locator-api only)
        '404':
          description: Object not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '422':
          description: Validation Error
        '500':
          description: Internal server error (object-server only).
        '503':
          description: >
            Object temporarily unavailable. From an object server, a PUT of
            this key is in progress. From the locator, no replica could be
            reached cleanly — at least one holds the object but is mid-upload.
            Retry after the delay in the `Retry-After` header.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Suggested retry delay in seconds
              example: 64
    put:
      tags:
        - Objects
      summary: Put Object
      description: >
        Store an object. If the client supplies a `Content-Type` header and the key has a
        recognizable file extension, the server validates that they are consistent (e.g.,
        `image/jpeg` for `.jpg`). `application/octet-stream` is always accepted for any
        extension. A mismatch returns `415 Unsupported Media Type`. GET responses determine
        Content-Type from the file extension regardless.


        `Content-Length` is required. The locator uses it to select a server with sufficient
        free space; the object server uses it to validate the upload. Requests without
        `Content-Length` are rejected with `411 Length Required`.


        Clients PUTting through the locator should send the `Expect: 100-continue` header.
        The locator answers PUT with a `307` redirect and never reads the request body; with
        the handshake it returns the `307` in place of `100 Continue`, so the body is sent
        only to the object server. Without it the body is uploaded twice — once to the
        locator (which discards it) and once to the object server. `requests` and `httpx`
        do not perform the `Expect: 100-continue` handshake even when the header is set
        explicitly — use `aiohttp` with `expect100=True` for clean single-upload behaviour.
      operationId: putObject
      parameters:
      - name: bucket
        in: path
        required: true
        schema:
          type: string
          title: Bucket
        example: my-bucket
      - name: key
        in: path
        required: true
        schema:
          type: string
          title: Key
        example: document.pdf
      - name: content-length
        in: header
        required: true
        schema:
          type: integer
          title: Content-Length
        example: 1048576
      - name: Expect
        in: header
        required: false
        description: >-
          Recommended when PUTting through the locator: sending `100-continue` makes the
          client wait for a `100 Continue` before sending the body, so the body skips the
          locator instead of being uploaded twice. See the operation description.
        schema:
          type: string
          enum:
            - 100-continue
          title: Expect
        example: 100-continue
      requestBody:
        required: true
        content:
          '*/*':
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Object stored
          headers:
            Repr-Digest:
              required: false
              schema:
                type: string
              example: 'sha-256=:LPJNul+wow4m6DsqxbninhsWHlwfp0JecwQzYpOLmCQ=:'
        '307':
          description: Temporary redirect to the server where the object should be uploaded (locator-api only)
        '400':
          description: Digest mismatch (uploaded content does not match Content-Digest header)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Digest Mismatch
                status: 400
                detail: Uploaded content does not match the provided Content-Digest header
        '409':
          description: >
            Object already exists, or a PUT of the same key is currently in
            progress (object-server only). Keys are immutable once written.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Conflict
                status: 409
                detail: "Object 'document.pdf' already exists in bucket 'my-bucket'"
        '405':
          description: Method Not Allowed — server is configured as read-only (object-server only)
        '411':
          description: Length Required — Content-Length header is missing
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Length Required
                status: 411
                detail: Content-Length header is required for PUT requests
        '415':
          description: >
            Unsupported Media Type — the Content-Type header does not match the MIME type
            implied by the key's file extension (object-server and locator). application/octet-stream
            is always accepted. If no Content-Type header is sent, or the extension is
            unrecognized, no validation is performed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Unsupported Media Type
                status: 415
                detail: "Content-Type 'text/plain' is inconsistent with the extension of key 'image.jpg'"
        '507':
          description: >
            Insufficient storage — no server has enough free space to accept this object
            (locator), or the disk filled up during write (object-server).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Insufficient Storage
                status: 507
                detail: No space available for this object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal server error (object-server only).
  /{bucket}/:
    get:
      tags:
        - Buckets
      summary: List Bucket
      description: List all items in a bucket
      operationId: listBucket
      parameters:
      - name: bucket
        in: path
        required: true
        schema:
          type: string
          title: Bucket
        example: my-bucket
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBucketResponse'
              example:
                bucket: my-bucket
                objects:
                  document.pdf:
                    directory: false
                    size: 1048576
                    checksum: 2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
                    content-type: application/pdf
                  archive:
                    directory: true
                    size: null
                    checksum: null
                    content-type: null
        '404':
          description: Bucket not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal server error (object-server only).
        '503':
          description: One or more upstream object servers returned an unexpected error (locator-api only)
    head:
      tags:
        - Buckets
      summary: Check Bucket Exists
      description: Check if a bucket exists without listing its contents
      operationId: headBucket
      parameters:
      - name: bucket
        in: path
        required: true
        schema:
          type: string
          title: Bucket
        example: my-bucket
      responses:
        '200':
          description: Bucket exists
        '404':
          description: Bucket not found
        '422':
          description: Validation Error
        '500':
          description: Internal server error (object-server only).
        '503':
          description: One or more upstream object servers returned an unexpected error (locator-api only)
  /:
    get:
      tags:
        - Buckets
      summary: List Buckets
      description: >
        List all bucket names. Bucket enumeration may be disabled on some servers,
        in which case 403 Forbidden is returned.
      operationId: listBuckets
      responses:
        '200':
          description: List of bucket names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBucketsResponse'
              example:
                buckets:
                  - my-bucket
                  - backups
                  - archive-2025
        '403':
          description: Bucket enumeration is not permitted on this server
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    HealthResponse:
      type: object
      description: >
        Health response shape differs by server type. The object server returns
        `read`, `write`, and quota fields. The locator returns only `servers`
        (a map of per-node health keyed by server URL).
      properties:
        read:
          type: boolean
          description: True if the server can serve reads (object-server only)
        write:
          type: boolean
          description: True if the server can accept writes (object-server only)
        quota-available-bytes:
          type: integer
          description: Free disk space in bytes, RFC 4331 (object-server only)
        quota-used-bytes:
          type: integer
          description: Used disk space in bytes, RFC 4331 (object-server only)
        percent:
          type: integer
          description: Percentage of free disk space (0-100), convenience field (object-server only)
        servers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NodeHealth'
          description: Per-server health keyed by server URL (locator-api only)
      title: HealthResponse
    NodeHealth:
      type: object
      required:
      - read
      - write
      - quota-available-bytes
      - quota-used-bytes
      - percent
      properties:
        read:
          type: boolean
        write:
          type: boolean
        quota-available-bytes:
          type: integer
          description: Free disk space in bytes (RFC 4331)
        quota-used-bytes:
          type: integer
          description: Used disk space in bytes (RFC 4331)
        percent:
          type: integer
          description: Percentage of free disk space (0-100), convenience field
      title: NodeHealth
    ListBucketResponse:
      type: object
      required:
      - bucket
      - objects
      properties:
        bucket:
          type: string
        objects:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ObjectInfo'
      title: ListBucketResponse
    ObjectInfo:
      type: object
      required:
      - directory
      properties:
        directory:
          type: boolean
        size:
          type:
          - integer
          - 'null'
        checksum:
          type:
          - string
          - 'null'
          description: >
            SHA-256 hex digest, null if unknown or conflicted.
            Equivalent to the ETag response header value without the surrounding quotes.
        content-type:
          type:
          - string
          - 'null'
          description: >
            MIME type of the object, null if unknown. This field is optional
            and may be omitted entirely by current implementations.
        locations:
          type: array
          items:
            type: string
          description: Server URLs where object is stored (locator-api only)
        error:
          type: boolean
          description: True if replicas have conflicting checksums (locator-api only)
      title: ObjectInfo
    ListBucketsResponse:
      type: object
      required:
      - buckets
      properties:
        buckets:
          type: array
          items:
            type: string
          description: Names of all buckets
      title: ListBucketsResponse
    ProblemDetail:
      type: object
      description: >
        RFC 9457 problem details for HTTP APIs. Current implementations may
        return FastAPI's default `{"detail": "..."}` JSON format instead;
        full RFC 9457 compliance is a future enhancement.
      properties:
        type:
          type: string
          description: URI identifying the problem type
        title:
          type: string
          description: Short human-readable summary of the problem
        status:
          type: integer
          description: HTTP status code
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
        instance:
          type: string
          description: URI identifying this specific occurrence of the problem
      title: ProblemDetail
